name: quality_growth
description: Quality and growth tilted offline research strategy.
version: v1
author: OpenClaw Quant
created_at: 2026-06-12
tags:
  - research
  - quality
  - growth
universe:
  type: default
  symbols:
    - AAPL
    - MSFT
    - NVDA
    - META
    - GOOGL
factors:
  - name: quality_score
    weight: 0.30
  - name: growth_score
    weight: 0.30
  - name: fundamental_quality_score
    weight: 0.25
  - name: low_volatility_score
    weight: 0.15
regime:
  enabled: false
portfolio:
  method: equal_weight
  max_position_weight: 0.25
  cash_buffer: 0.10
risk:
  max_drawdown_limit: 0.25
  max_turnover: 3.0
  min_factor_confidence: 0.45
execution:
  cost_model: combined
  slippage_model: bps
  slippage_bps: 8
  max_adv_participation: 0.05
validation:
  require_walk_forward: false
  minimum_ic: 0.01
  minimum_coverage: 0.25
  minimum_regime_sample: 30
metadata:
  top_n: 3
