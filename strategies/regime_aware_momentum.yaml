name: regime_aware_momentum
description: Momentum research strategy with regime diagnostics.
version: v1
author: OpenClaw Quant
created_at: 2026-06-12
tags:
  - research
  - momentum
  - regime
universe:
  type: default
  symbols:
    - SPY
    - QQQ
    - AAPL
    - MSFT
    - NVDA
factors:
  - name: momentum_20d
    weight: 0.30
  - name: momentum_60d
    weight: 0.30
  - name: risk_adjusted_momentum
    weight: 0.25
  - name: low_volatility_score
    weight: 0.15
regime:
  enabled: true
  adjust_confidence: true
  preferred_regimes:
    - BULL
    - TRENDING
portfolio:
  method: inverse_volatility
  max_position_weight: 0.25
  cash_buffer: 0.10
risk:
  max_drawdown_limit: 0.25
  max_turnover: 3.0
  min_factor_confidence: 0.50
execution:
  cost_model: combined
  slippage_model: bps
  slippage_bps: 10
  max_adv_participation: 0.05
validation:
  require_walk_forward: true
  minimum_ic: 0.02
  minimum_coverage: 0.30
  minimum_regime_sample: 30
metadata:
  top_n: 3
