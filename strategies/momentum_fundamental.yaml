name: momentum_fundamental
description: Momentum plus fundamental quality/value research strategy.
version: v1
author: OpenClaw Quant
created_at: 2026-06-12
tags:
  - research
  - multi_factor
  - offline
universe:
  type: default
  symbols:
    - SPY
    - QQQ
    - NVDA
    - AAPL
    - MSFT
factors:
  - name: momentum_60d
    weight: 0.25
  - name: fundamental_quality_score
    weight: 0.25
  - name: fundamental_growth_score
    weight: 0.25
  - name: fundamental_value_score
    weight: 0.25
regime:
  enabled: true
  adjust_confidence: true
  preferred_regimes:
    - BULL
    - LOW_VOL
portfolio:
  method: risk_parity
  max_position_weight: 0.20
  cash_buffer: 0.10
risk:
  max_drawdown_limit: 0.25
  max_turnover: 3.0
  min_factor_confidence: 0.50
execution:
  cost_model: combined
  slippage_model: bps
  slippage_bps: 10
  max_adv_participation: 0.05
validation:
  require_walk_forward: true
  minimum_ic: 0.02
  minimum_coverage: 0.30
  minimum_regime_sample: 30
metadata:
  top_n: 3
